<template>
    <lightning-card title="Visita(s) da Rota" icon-name="standard:location">
        
        <div class="slds-card__body slds-card__body_inner slds-position_relative" style="min-height: 200px;">
            
            <!-- SPINNER -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Carregando" size="medium"></lightning-spinner>
            </template>

            <!-- CENÁRIO 1: COM VISITAS (MAPA) -->
            <template if:true={hasVisits}>
                <div class="map-root" lwc:dom="manual" style="border-radius: 4px; border: 1px solid #dddbda;"></div>
                
                <!-- Badge de Status Flutuante -->
                <div style="position: absolute; top: 10px; right: 10px; z-index: 1000;">
                    <span class={statusClass}>{statusMessage}</span>
                </div>
            </template>

            <!-- CENÁRIO 2: SEM VISITAS (EMPTY STATE) -->
            <template if:false={hasVisits}>
                <div class="slds-illustration slds-illustration_small" style="padding: 2rem 0;">
                    <img src="/img/chatter/Desert.svg" class="slds-illustration__svg" alt="Nenhuma Rota"/>
                    <div class="slds-text-longform">
                        <h3 class="slds-text-heading_medium">Nenhuma Rota Definida</h3>
                        <p class="slds-text-body_regular">Este registro ainda não possui visitas cadastradas para gerar o mapa.</p>
                    </div>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
